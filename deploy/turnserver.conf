# coturn TURN server configuration
# https://github.com/coturn/coturn/wiki/turnserver

# Listening IP and port
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Relay IP — advertised to clients as the TURN candidate address
# Coturn binds to 0.0.0.0 but tells clients to use this IP for relay
relay-ip=0.0.0.0
external-ip=10.81.20.67

# Relay port range (match the docker-compose port mapping)
min-port=49160
max-port=49200

# Authentication
realm=remote-agent.local
user=agent:changeme_in_prod

# Logging
# Use syslog so we can see coturn logs via docker logs
log-file=stdout
verbose
syslog
stunnel disabled
no-tls-v1x
no-tlsv1
no-tlsv1_1
no-tlsv1_2

# Fingerprint for STUN messages
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Deny relay to loopback / private ranges for security
no-loopback-peers
no-multicast-peers
no-multicast-peers

# Enable REST API for dynamic credentials (optional)
# use-auth-secret
# static-auth-secret=MY_STATIC_SECRET
