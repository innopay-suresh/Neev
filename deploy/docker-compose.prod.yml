version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: remote_agent
      POSTGRES_USER: remote_agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-remote_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  turn:
    image: coturn/coturn:latest
    restart: always
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
    command: turnserver -c /etc/turnserver.conf

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      CONFIG_PATH: /app/config.yaml
    volumes:
      - ./config.prod.yaml:/app/config.yaml:ro

volumes:
  redis_data:
  postgres_data:
