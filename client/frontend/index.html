<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neev Remote</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script>
    function showError(msg, lineNo) {
      var d = document.createElement('div');
      d.style.color = 'red';
      d.style.padding = '20px';
      d.style.zIndex = '99999';
      d.style.position = 'absolute';
      d.innerHTML = 'Error: ' + msg + (lineNo ? '<br/>Line: ' + lineNo : '');
      document.body.appendChild(d);
    }
    window.onerror = function(msg, url, lineNo) { showError(msg, lineNo); }
    window.addEventListener('unhandledrejection', function(event) { showError(event.reason); });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
